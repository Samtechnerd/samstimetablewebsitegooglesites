<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transparent Carousel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<style>
/* Make everything transparent */
body { 
  background: transparent; 
}
.swiper { 
  width: 100%; 
  padding: 40px 0 60px; 
  background: transparent; /* Transparent container */
}
.swiper-slide { 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  background: transparent; /* Transparent slides */
}
.slide-box { 
  width: 300px; 
  height: 180px; 
  border-radius: 14px; 
  overflow: hidden; 
  border: 2px solid #e5e7eb; 
  transition: 0.3s; 
  background: transparent; /* Transparent box */
}
.slide-box:hover { 
  border-color: #4F46E5; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
}
.slide-box img { 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
}
.swiper-pagination-bullet { 
  width: 16px !important; 
  height: 4px !important; 
  border-radius: 5px !important; 
}
.swiper-pagination-bullet-active { 
  background: #4F46E5 !important; 
}
</style>
</head>
<body>
<div class="max-w-6xl mx-auto">
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <!-- Only original 4 slides -->
      <div class="swiper-slide"><div class="slide-box"><img src="https://samtechnerd.github.io/samstimetablewebsitegooglesites/1.png" alt="1"></div></div>
      <div class="swiper-slide"><div class="slide-box"><img src="https://samtechnerd.github.io/samstimetablewebsitegooglesites/2.png" alt="2"></div></div>
      <div class="swiper-slide"><div class="slide-box"><img src="https://samtechnerd.github.io/samstimetablewebsitegooglesites/3.png" alt="3"></div></div>
      <div class="swiper-slide"><div class="slide-box"><img src="https://samtechnerd.github.io/samstimetablewebsitegooglesites/4.png" alt="4"></div></div>
    </div>
    <div class="swiper-pagination"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
var swiper = new Swiper(".mySwiper", {
  slidesPerView: 3,
  spaceBetween: 30,
  loop: true,
  loopedSlides: 4,
  centeredSlides: false,
  autoplay: {
    delay: 3000,
    disableOnInteraction: false,
  },
  speed: 600,
  pagination: {
    el: ".swiper-pagination",
    clickable: true,
    type: "bullets",
  },
  breakpoints: {
    0: { slidesPerView: 1 },
    768: { slidesPerView: 2 },
    1024: { slidesPerView: 3 }
  }
});
</script>
</body>
</html>
